<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Projects — Swarup Dewanjee</title>
    <meta name="description" content="A collection of projects by Swarup Dewanjee.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/4x0gX4bW/dark.png" />
    
    <!-- Fonts: Cormorant Garamond (display) + Outfit (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════════════ */
        :root {
            --primary-500: #18181b;

            /* Light palette */
            --light-bg:             #f8fafc;
            --light-bg-2:           #eceae4;
            --light-card:           #ffffff;
            --light-card-hover:     #f1f5f9;
            --light-text:           #0f172a;
            --light-text-secondary: #475569;
            --light-text-body:      #1e293b;
            --light-border:         #e2e8f0;
            --light-border-subtle:  #eae8e2;

            /* Dark palette — elevated for readability */
            --dark-bg:              #070708;
            --dark-bg-2:            #0e0e10;
            --dark-card:            #131316;
            --dark-card-2:          #18181c;
            --dark-card-hover:      #1f1f24;
            --dark-text:            #e2e2e8;
            --dark-text-secondary:  #b8b8c4;
            --dark-text-muted:       #8484920;
            --dark-text-bright:     #f2f2f5;
            --dark-border:          #2a2a30;
            --dark-border-subtle:   #1e1e24;

            /* Gradients */
            --gradient-main:        linear-gradient(135deg, #0a0a0c 0%, #3a3a42 100%);
            --gradient-accent:      linear-gradient(135deg, #3a3a42 0%, #18181b 100%);
            --gradient-shimmer:     linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
            --dark-btn-gradient:    linear-gradient(135deg, #d0d0d8 0%, #f2f2f5 100%);
            --dark-btn-text:        #0e0e11;

            /* Typography */
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body:    'Outfit', system-ui, -apple-system, sans-serif;

            /* Radii */
            --radius-xs:   4px;
            --radius-sm:   8px;
            --radius-md:   14px;
            --radius-lg:   20px;
            --radius-xl:   28px;
            --radius-pill: 9999px;

            /* Easing */
            --ease-spring:  cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
            --ease-in-out:  cubic-bezier(0.4, 0, 0.2, 1);

            /* Shadows */
            --shadow-sm:       0 2px 8px rgba(0,0,0,0.06);
            --shadow-md:       0 8px 24px rgba(0,0,0,0.09);
            --shadow-lg:       0 20px 48px rgba(0,0,0,0.11);
            --shadow-dark-sm:  0 2px 8px rgba(0,0,0,0.3);
            --shadow-dark-md:  0 8px 24px rgba(0,0,0,0.42);
            --shadow-dark-lg:  0 20px 48px rgba(0,0,0,0.52);
        }

        /* ═══════════════════════════════════════════════════
           SCROLLBAR
           ═══════════════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #c0bfbb 0%, #8a8a92 100%);
            border-radius: var(--radius-pill);
        }
        ::-webkit-scrollbar-thumb:hover { background: #6a6a74; }
        body.dark-theme::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #2e2e36 0%, #4a4a55 100%);
        }
        body.dark-theme::-webkit-scrollbar-thumb:hover { background: #6a6a78; }

        /* ═══════════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.65;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            transition: background-color 0.5s var(--ease-in-out),
                        color 0.5s var(--ease-in-out);
        }
        body:not(.dark-theme) { background-color: var(--light-bg); color: var(--light-text-body); }
        body.dark-theme       { background-color: var(--dark-bg);  color: var(--dark-text); }

        /* Noise grain overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none; z-index: 1; opacity: 0.022;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }
        body.dark-theme::before { opacity: 0.042; }

        /* Animated mesh background */
        body::after {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
            animation: bgDrift 20s ease-in-out infinite alternate;
        }
        body:not(.dark-theme)::after {
            background:
                radial-gradient(ellipse 65% 50% at 85% 5%, rgba(0,0,0,0.04) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 5% 95%, rgba(0,0,0,0.025) 0%, transparent 60%);
        }
        body.dark-theme::after {
            background:
                radial-gradient(ellipse 60% 50% at 85% 5%, rgba(120,120,160,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 45% 35% at 5% 95%, rgba(100,100,150,0.035) 0%, transparent 55%);
        }
        @keyframes bgDrift {
            0%   { transform: translate(0,0) scale(1); }
            100% { transform: translate(1.5%, 1%) scale(1.03); }
        }

        /* ═══════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════ */
        .container { max-width: 1080px; margin: 0 auto; padding: 0 1.5rem; }
        .section { padding: 5rem 0; position: relative; z-index: 10; }
        body:not(.dark-theme) .section { background: transparent; }
        body.dark-theme       .section { background: transparent; }

        /* ═══════════════════════════════════════════════════
           NAVIGATION
           ═══════════════════════════════════════════════════ */
        .floating-nav {
            position: fixed; top: 1.25rem; left: 50%;
            transform: translateX(-50%);
            z-index: 1000; padding: 0 1rem;
            width: 100%; max-width: 1400px;
            /* [UPDATE 1] Smooth transition for scroll-hide */
            transition: transform 0.4s var(--ease-out), opacity 0.35s ease;
            display: flex; align-items: center; justify-content: center;
        }

        /* [UPDATE 1] Hide nav on scroll-down */
        .floating-nav.scroll-hidden {
            transform: translateX(-50%) translateY(-200%);
            opacity: 0;
            pointer-events: none;
        }

        /* PC Back Button */
        .nav-back-pc {
            position: absolute; left: 1rem; top: 63%;
            transform: translateY(-50%); z-index: 1001;
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.42rem 0.88rem;
            border-radius: var(--radius-pill);
            font-family: var(--font-body);
            font-size: 0.8rem; font-weight: 500;
            white-space: nowrap;
            transition: all 0.25s var(--ease-out);
            text-decoration: none;
            background: transparent;
            border: 1.5px solid var(--light-border);
            color: var(--light-text);
        }
        body.dark-theme .nav-back-pc {
            color: var(--dark-text); border-color: var(--dark-border);
        }
        .nav-back-pc svg { width: 14px; height: 14px; flex-shrink: 0; }
        body:not(.dark-theme) .nav-back-pc:hover {
            background: var(--gradient-main); color: #fff !important;
            border-color: transparent !important;
            transform: translateY(-50%) scale(1.03);
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }
        body.dark-theme .nav-back-pc:hover {
            background: var(--dark-btn-gradient); color: var(--dark-btn-text) !important;
            border-color: transparent !important;
            transform: translateY(-50%) scale(1.03);
            box-shadow: 0 4px 14px rgba(255,255,255,0.08);
        }
        body.dark-theme .nav-back-pc:hover svg { stroke: var(--dark-btn-text) !important; }

        /* Nav pill */
        .nav-menu {
            display: flex; align-items: center; gap: 0.18rem;
            padding: 0.32rem 0.44rem;
            border-radius: var(--radius-pill);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            width: fit-content; margin: 0 auto;
        }
        body:not(.dark-theme) .nav-menu {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.07),
                        0 1px 4px rgba(0,0,0,0.04),
                        inset 0 1px 0 rgba(255,255,255,0.9);
        }
        body.dark-theme .nav-menu {
            background: rgba(13,13,16,0.72);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 24px rgba(0,0,0,0.5),
                        0 1px 6px rgba(0,0,0,0.4),
                        inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .nav-item {
            display: flex; align-items: center; gap: 0.38rem;
            padding: 0.46rem 0.95rem;
            border-radius: var(--radius-pill);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 0.82rem; font-weight: 500;
            letter-spacing: 0.01em; white-space: nowrap;
            transition: all 0.22s var(--ease-out);
            cursor: pointer; border: none; background: transparent;
        }
        .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
        body:not(.dark-theme) .nav-item { color: var(--light-text-secondary); }
        body.dark-theme       .nav-item { color: var(--dark-text-secondary); }

        body:not(.dark-theme) .nav-item:hover,
        body:not(.dark-theme) .nav-item.active-nav {
            background: var(--gradient-main); color: #fff !important;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2); transform: scale(1.03);
        }
        body.dark-theme .nav-item:hover,
        body.dark-theme .nav-item.active-nav {
            background: var(--dark-btn-gradient); color: var(--dark-btn-text) !important;
            box-shadow: 0 4px 14px rgba(255,255,255,0.08); transform: scale(1.03);
        }
        body.dark-theme .nav-item:hover svg,
        body.dark-theme .nav-item.active-nav svg { stroke: var(--dark-btn-text) !important; }

        /* Mobile nav bar */
        .mobile-nav-bar {
            display: none;
            grid-template-columns: 1fr auto 1fr !important;
            align-items: center !important; width: 100% !important;
            padding: 0.65rem 1rem !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        body:not(.dark-theme) .mobile-nav-bar {
            background: rgba(244,243,239,0.82) !important;
            backdrop-filter: blur(22px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(22px) saturate(180%) !important;
        }
        body.dark-theme .mobile-nav-bar {
            background: rgba(7,7,8,0.82) !important;
            backdrop-filter: blur(22px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(22px) saturate(180%) !important;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-back-mobile {
            display: flex; align-items: center; gap: 0.3rem;
            font-family: var(--font-body);
            font-size: 0.78rem; font-weight: 500;
            text-decoration: none; justify-self: start;
            padding: 0.38rem 0.8rem;
            border-radius: var(--radius-pill);
            border: 1.5px solid var(--light-border);
            transition: all 0.22s var(--ease-out);
            color: var(--light-text);
        }
        body.dark-theme .nav-back-mobile { color: var(--dark-text); border-color: var(--dark-border); }
        .nav-back-mobile svg { width: 13px; height: 13px; }
        body:not(.dark-theme) .nav-back-mobile:hover {
            background: var(--gradient-main); color: #fff !important;
            border-color: transparent !important; box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }
        body.dark-theme .nav-back-mobile:hover {
            background: var(--dark-btn-gradient); color: var(--dark-btn-text) !important;
            border-color: transparent !important;
        }
        body.dark-theme .nav-back-mobile:hover svg { stroke: var(--dark-btn-text) !important; }

        .mobile-menu-btn {
            display: none; background: transparent; border: none;
            cursor: pointer; padding: 0.5rem; border-radius: var(--radius-md);
            transition: all 0.22s; z-index: 10; justify-self: center;
        }
        body:not(.dark-theme) .mobile-menu-btn { color: var(--light-text); }
        body.dark-theme       .mobile-menu-btn { color: var(--dark-text-bright); }
        body:not(.dark-theme) .mobile-menu-btn:hover { background: var(--gradient-main); color: #fff; }
        body.dark-theme       .mobile-menu-btn:hover { background: var(--dark-btn-gradient); color: var(--dark-btn-text); }
        .mobile-menu-btn .close-icon { display: none; }
        .mobile-menu-btn.active .menu-icon  { display: none; }
        .mobile-menu-btn.active .close-icon { display: block; }

        @media (max-width: 900px) {
            .floating-nav {
                justify-content: flex-start !important; padding: 0 !important;
                background: transparent !important; backdrop-filter: none !important; top: 0 !important;
            }
            /* [UPDATE 1] Mobile scroll-hide uses same stacked transform */
            .floating-nav.scroll-hidden {
                transform: translateX(-50%) translateY(-200%);
                opacity: 0;
                pointer-events: none;
            }
            .nav-back-pc     { display: none; }
            .mobile-nav-bar  { display: grid !important; }
            .mobile-menu-btn { display: flex !important; align-items: center; justify-content: center; }
            .mobile-menu-btn svg { width: 25px; height: 25px; display: block; }

            .nav-menu {
                display: none; position: absolute;
                top: 100%; left: auto; right: 0;
                width: 55%; min-width: 230px;
                flex-direction: column; align-items: stretch;
                border-radius: var(--radius-xl);
                padding: 0.9rem; gap: 0.35rem; margin: 0;
            }
            body:not(.dark-theme) .nav-menu {
                background: rgba(255,255,255,0.97);
                border-top: 1px solid rgba(0,0,0,0.05);
                border-right: 1px solid rgba(0,0,0,0.05);
            }
            body.dark-theme .nav-menu {
                background: rgba(10,10,12,0.97);
                border-color: rgba(255,255,255,0.09);
            }
            .nav-menu.active { display: flex; animation: slideDown 0.28s var(--ease-out); }
            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-8px); }
                to   { opacity: 1; transform: translateY(0); }
            }
            .nav-item {
                padding: 0.7rem 1rem; border-radius: var(--radius-md);
                font-size: 0.92rem; justify-content: flex-start;
            }
            .nav-item svg { width: 16px; height: 16px; }
        }

        /* ═══════════════════════════════════════════════════
           THEME TOGGLE
           ═══════════════════════════════════════════════════ */
        .theme-toggle {
            position: fixed; top: 1.1rem; right: 1.1rem; z-index: 1001;
            padding: 0.48rem; border-radius: var(--radius-pill);
            border: none; cursor: pointer;
            /* [UPDATE 1] Transition covers opacity + transform for scroll-hide */
            transition: all 0.35s var(--ease-spring), opacity 0.35s ease;
            display: flex; align-items: center; justify-content: center;
            background: var(--gradient-main); color: #fff;
            box-shadow: 0 4px 18px rgba(0,0,0,0.14);
        }
        body.dark-theme .theme-toggle {
            background: var(--dark-btn-gradient); color: var(--dark-btn-text);
            box-shadow: 0 4px 18px rgba(255,255,255,0.08);
        }
        .theme-toggle:hover { transform: scale(1.15) rotate(12deg); }
        .theme-toggle .sun-icon  { display: none; width: 20px; height: 20px; }
        .theme-toggle .moon-icon { display: block; width: 20px; height: 20px; }
        body.dark-theme .theme-toggle .sun-icon  { display: block; }
        body.dark-theme .theme-toggle .moon-icon { display: none; }
        body.dark-theme .theme-toggle svg { stroke: var(--dark-btn-text) !important; }

        /* [UPDATE 1] Hide theme toggle on scroll-down */
        .theme-toggle.scroll-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-14px) scale(0.8);
        }

        @media (max-width: 900px) {
            .theme-toggle { top: 0.75rem; right: 0.75rem; }
        }

        /* ═══════════════════════════════════════════════════
           MAIN CONTENT
           ═══════════════════════════════════════════════════ */
        .projects-section { padding-top: 7rem; }

        /* Section title — Cormorant Garamond */
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.6rem;
            letter-spacing: -0.02em;
            line-height: 1.12;
        }
        body:not(.dark-theme) .section-title { color: var(--light-text); }
        body.dark-theme       .section-title { color: var(--dark-text-bright); }

        /* Elegant underline accent */
        .section-title-wrap { text-align: center; margin-bottom: 2.8rem; }
        .section-title-wrap .section-title { margin-bottom: 0.6rem; }
        .title-accent {
            display: block; width: 2.5rem; height: 2px;
            margin: 0.6rem auto 0;
            border-radius: var(--radius-pill);
            background: var(--gradient-main); opacity: 0.55;
        }
        body.dark-theme .title-accent {
            background: var(--dark-btn-gradient); opacity: 0.45;
        }

        .section-subtitle {
            font-family: var(--font-body);
            font-size: 0.875rem; font-weight: 400;
            text-align: center; margin-top: -2.2rem; margin-bottom: 2.8rem;
            max-width: 560px; margin-left: auto; margin-right: auto;
            line-height: 1.7;
        }
        body:not(.dark-theme) .section-subtitle { color: var(--light-text-secondary); }
        body.dark-theme       .section-subtitle { color: var(--dark-text-secondary); }

        /* ═══════════════════════════════════════════════════
           PROJECTS GRID
           ═══════════════════════════════════════════════════ */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.15rem;
            animation: gridIn 0.5s var(--ease-out) both;
        }
        @keyframes gridIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 1025px) {
            .projects-grid.center-single .project-card { grid-column: 2 / 3; }
        }
        @media (max-width: 1024px) { .projects-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 768px)  { .projects-grid { grid-template-columns: 1fr; } }

        /* ═══════════════════════════════════════════════════
           PROJECT CARD
           ═══════════════════════════════════════════════════ */
        .project-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.32s var(--ease-out);
            border: 1px solid transparent;
            display: flex; flex-direction: column;
            position: relative;
            cursor: default;
        }
        body:not(.dark-theme) .project-card {
            background: var(--light-card);
            box-shadow: var(--shadow-sm);
        }
        body.dark-theme .project-card {
            background: var(--dark-card);
            box-shadow: var(--shadow-dark-sm);
            border-color: var(--dark-border-subtle);
        }

        /* Shimmer on hover */
        .project-card::before {
            content: '';
            position: absolute; inset: 0; z-index: 1;
            background: var(--gradient-shimmer);
            background-size: 200% 100%;
            opacity: 0;
            transition: opacity 0.45s ease;
            pointer-events: none;
        }
        .project-card:hover::before { opacity: 1; }

        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0,0,0,0.18);
            box-shadow: var(--shadow-lg);
        }
        body.dark-theme .project-card:hover {
            border-color: rgba(255,255,255,0.16);
            box-shadow: var(--shadow-dark-lg);
        }

        /* Card image — [UPDATE 2] slightly taller */
        .card-image {
            position: relative; width: 100%; height: 8.5rem;
            overflow: hidden; flex-shrink: 0;
        }
        .card-image img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.55s var(--ease-out), filter 0.4s ease;
            filter: grayscale(20%) brightness(0.97);
        }
        .card-image:hover img { transform: scale(1.07); filter: grayscale(0%) brightness(1.02); }
        body:not(.dark-theme) .card-image::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.52), transparent);
            opacity: 0.38;
        }
        body.dark-theme .card-image::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55), transparent 65%);
            opacity: 0.5;
        }

        /* Card content — [UPDATE 2] slightly more padding */
        .card-content {
            padding: 0.9rem 1rem 0.85rem;
            flex: 1; display: flex; flex-direction: column;
            position: relative; z-index: 2;
        }

        /* [UPDATE 2] Slightly larger type throughout the card */
        .card-title {
            font-family: var(--font-display);
            font-size: 1rem; font-weight: 500;
            margin-bottom: 0.12rem; line-height: 1.28;
            letter-spacing: -0.01em;
        }
        body:not(.dark-theme) .card-title { color: var(--light-text); }
        body.dark-theme       .card-title { color: var(--dark-text-bright) !important; }

        .card-subtitle {
            font-size: 0.68rem; font-weight: 500;
            margin-bottom: 0.28rem;
            text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7;
        }
        body:not(.dark-theme) .card-subtitle { color: var(--light-text-secondary); }
        body.dark-theme       .card-subtitle { color: var(--dark-text-secondary) !important; }

        .card-description {
            font-size: 0.81rem; line-height: 1.52;

/* ── State ── */
let activeFilter = 'all';

function filtered() {
    return activeFilter === 'all' ? PROJECTS : PROJECTS.filter(p => p.category === activeFilter);
}

function cardHtml(p) {
    return `<div class="project-card">
        <div class="card-image"><img src="${p.image}" alt="${p.title}" loading="lazy"></div>
        <div class="card-content">
            <h3 class="card-title">${p.title}</h3>
            <div class="card-subtitle">${p.date}</div>
            <p class="card-description">${p.description}</p>
            <div class="card-tags">${p.skills.map(s => `<span class="tag">${s}</span>`).join('')}</div>
            <div class="card-actions">
                <a href="${p.github}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">${GITHUB_SVG} GitHub</a>
                ${p.live ? `<a href="${p.live}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">${LIVE_SVG} Live</a>` : ''}
            </div>
        </div>
    </div>`;
}

function renderGrid() {
    const grid = document.getElementById('projects-grid');
    const list = filtered();
    grid.className = 'projects-grid';
    if (list.length === 0) {
        grid.innerHTML = '<div class="no-results">No projects in this category.</div>';
        return;
    }
    if (list.length === 1) grid.classList.add('center-single');
    /* Re-trigger entrance animation */
    grid.style.animation = 'none';
    grid.offsetHeight; /* reflow */
    grid.style.animation = '';
    grid.innerHTML = list.map(cardHtml).join('');
}

/* ── Navigation / filter ── */
const navItems = document.querySelectorAll('.nav-item[data-filter]');
const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const navMenu = document.getElementById('nav-menu');
const floatingNav = document.getElementById('floating-nav');
const themeToggle = document.getElementById('theme-toggle');
const goTopBtn = document.getElementById('go-to-top');

function closeMobileMenu() {
    if (navMenu.classList.contains('active')) {
        navMenu.classList.remove('active');
        mobileMenuBtn.classList.remove('active');
        mobileMenuBtn.setAttribute('aria-expanded', 'false');
    }
}

navItems.forEach(item => {
    item.addEventListener('click', () => {
        navItems.forEach(i => i.classList.remove('active-nav'));
        item.classList.add('active-nav');
        activeFilter = item.dataset.filter;
        renderGrid();
        closeMobileMenu();
    });
});

mobileMenuBtn.addEventListener('click', () => {
    const isActive = navMenu.classList.toggle('active');
    mobileMenuBtn.classList.toggle('active');
    mobileMenuBtn.setAttribute('aria-expanded', isActive);
});
document.addEventListener('click', (e) => {
    if (!navMenu.classList.contains('active')) return;
    if (floatingNav.contains(e.target)) return;
    closeMobileMenu();
});
window.addEventListener('resize', () => {
    if (window.innerWidth > 900) closeMobileMenu();
});

/* ── Theme ── */
themeToggle.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark-theme')));
function applyTheme(dark) {
    document.body.classList.toggle('dark-theme', dark);
    localStorage.setItem('theme', dark ? 'dark' : 'light');
}
applyTheme(localStorage.getItem('theme') === 'dark');

/* ── [UPDATE 1] Unified scroll handler: hide nav + theme toggle on scroll-down,
       show on scroll-up; go-to-top only appears when scrolling up past 300px ── */
let lastScrollY = window.scrollY;
const SCROLL_DELTA = 8; /* minimum px change to act on (avoids micro-jitter) */

window.addEventListener('scroll', () => {
    const currentScrollY = window.scrollY;
    const diff = currentScrollY - lastScrollY;

    /* Ignore tiny movements */
    if (Math.abs(diff) < SCROLL_DELTA) return;

    const scrollingDown = diff > 0;
    const pastInitial   = currentScrollY > 80;          /* only hide after leaving the top zone */
    const menuOpen      = navMenu.classList.contains('active'); /* don't hide while dropdown is open */

    const shouldHide = scrollingDown && pastInitial && !menuOpen;

    floatingNav.classList.toggle('scroll-hidden', shouldHide);
    themeToggle.classList.toggle('scroll-hidden', shouldHide);

    /* Go-to-top: visible only when scrolling UP and already past 300 px */
    goTopBtn.classList.toggle('visible', !scrollingDown && currentScrollY > 300);

    lastScrollY = currentScrollY;
}, { passive: true });

/* ── Go to Top (click) ── */
goTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* ── Footer year ── */
document.getElementById('current-year').textContent = new Date().getFullYear();

/* ── Init ── */
renderGrid();
</script>
